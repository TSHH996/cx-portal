<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CX Portal — Login</title>

  <!-- Tajawal -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <!-- Your existing styles -->
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div style="min-height:100vh;display:grid;place-items:center;padding:18px;">
    <div class="card" style="width:min(560px,100%);padding:18px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
        <div class="logo">CX</div>
        <div style="min-width:0">
          <div style="font-weight:900;font-size:18px;">CX Portal</div>
          <div style="color:var(--muted);font-size:13px;">Sign in with Email & Password</div>
        </div>
      </div>

      <div class="card" style="background:rgba(255,255,255,.03);border:1px solid var(--stroke);box-shadow:none;padding:14px;border-radius:18px;">
        <div class="field" style="margin-bottom:12px;">
          <label>Email</label>
          <input id="email" class="input" type="email" placeholder="name@company.com" autocomplete="username" />
        </div>

        <div class="field" style="margin-bottom:12px;">
          <label>Password</label>
          <input id="password" class="input" type="password" placeholder="••••••••" autocomplete="current-password" />
        </div>

        <div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;">
          <button id="btnLogin" class="btn primary" type="button">Login</button>
        </div>

        <div id="msg" style="margin-top:10px;color:var(--muted);font-size:13px;line-height:1.6;"></div>
      </div>

      <div style="margin-top:12px;color:var(--muted2);font-size:12px;line-height:1.6;">
        If you forgot your password, contact the CX admin to reset it.
      </div>
    </div>
  </div>

  <script type="module" src="./login.js"></script>
</body>
</html>
