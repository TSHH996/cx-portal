<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CX Portal — Branch Reply</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    body{font-family:Tajawal,system-ui,Arial;background:#0b0f17;color:#e9eef7;margin:0}
    .wrap{max-width:900px;margin:0 auto;padding:20px}
    .card{background:#121a2a;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;margin:12px 0}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    label{display:block;font-size:14px;opacity:.9;margin:8px 0 6px}
    input, textarea, select{width:100%;box-sizing:border-box;border-radius:12px;border:1px solid rgba(255,255,255,.12);
      background:#0e1524;color:#e9eef7;padding:10px 12px;outline:none}
    textarea{min-height:120px;resize:vertical}
    .btn{display:inline-block;border:0;border-radius:12px;padding:12px 14px;font-weight:800;cursor:pointer}
    .btn-primary{background:#ffffff;color:#0b0f17}
    .muted{opacity:.75;font-size:13px}
    .error{color:#ffb4b4}
    .ok{color:#b8ffcf}
    @media(max-width:780px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h2 style="margin:10px 0 6px">Branch Reply Form</h2>
    <div class="muted">Open from the email link and submit your reply.</div>

    <div id="msg" class="card muted">Loading…</div>

    <div class="card" id="ticketCard" style="display:none">
      <div class="row">
        <div>
          <label>Ticket No</label>
          <input id="ticketNo" readonly />
        </div>
        <div>
          <label>Branch Name</label>
          <input id="branchName" readonly />
        </div>
      </div>

      <div class="row">
        <div>
          <label>Customer Name</label>
          <input id="customerName" readonly />
        </div>
        <div>
          <label>Customer Phone</label>
          <input id="customerPhone" readonly />
        </div>
      </div>

      <label>Ticket Description</label>
      <textarea id="ticketDesc" readonly></textarea>

      <hr style="border:0;border-top:1px solid rgba(255,255,255,.08);margin:14px 0">

      <label>Reply Text <span class="error">*</span></label>
      <textarea id="replyText" placeholder="Write your reply…"></textarea>

      <label>Action Taken (optional)</label>
      <textarea id="actionTaken" placeholder="What action was taken?"></textarea>

      <div class="row">
        <div>
          <label>Status after reply</label>
          <select id="status">
            <option value="Replied">Replied</option>
            <option value="Closed">Closed</option>
          </select>
        </div>
        <div>
          <label>Attachments (optional)</label>
          <input id="files" type="file" multiple />
          <div class="muted" id="filesHint"></div>
        </div>
      </div>

      <div style="margin-top:14px">
        <button class="btn btn-primary" id="submitBtn">Submit Reply</button>
      </div>
    </div>
  </div>

  <script src="./reply.js"></script>
</body>
</html>
